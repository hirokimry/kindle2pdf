# kindle2pdf 設定サンプル
# 実運用では config.yaml にコピーして region を calibrate で実測して埋める。
book_title: "sample-book"

capture:
  auto_region: true               # true=Kindleウィンドウを自動検出→ screencapture -l で撮り、AX実測のタイトルバー帯だけ上端クロップ（推奨/前面化不要・本文余白を削らない・通常ウィンドウ前提）。false で下の静的 region
  region: [0, 0, 0, 0]            # auto_region=false 時のみ使用。[x, y, w, h] を calibrate で実測
  app_name: "Kindle"              # Kindle の AppleScript 名。新しめの Mac 版は "Amazon Kindle"
  spread_mode: true               # true=見開き両ページ（左右分割する） / false=片ページ（分割しない）
  page_turn_key: "right"          # right(key code 124) / left(123)。右綴じ本は要確認
  page_turn_method: "osascript"   # osascript | cliclick
  page_turn_wait: 1.0             # ページ送り後の描画待ち秒
  stable_wait: 0.3                # 安定確認の追加待ち
  stable_required: 2              # 連続安定フレーム数（撮影確定）
  stable_threshold: 2             # 安定確認用のpHash距離（連続フレームの同一判定）
  end_detect_repeats: 3           # 同一ハッシュ連続で終了
  same_threshold: 2               # 前ページとの重複判定用のpHash距離（サムネ除去前提）
  max_pages: 3000                 # 安全上限
  prevent_sleep: true             # caffeinate 併用

preprocess:
  trim: { top: 0.11, bottom: 0.035, left: 0.015, right: 0.015 }  # 比率トリミング
  min_brightness: 20              # これ未満は黒画面異常として除外

ocr:
  languages: ["ja-JP", "en-US"]
  recognition_level: "accurate"   # accurate | fast
  reading_order: "split"          # split(分割前提で単純Yソート) | column(未分割で列認識)

build:
  image_format: "jpeg"
  jpeg_quality: 88
  target_dpi: 300
  font: "HeiseiMin-W3"            # reportlab内蔵CIDフォント（日本語テキスト層用）
