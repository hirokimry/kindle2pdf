# kindle2pdf 設定サンプル
# 実運用では config.yaml にコピーして使う。撮影領域は Kindle ウィンドウを自動検出するため実測不要。
book_title: "sample-book"

capture:
  # 撮影は常に Kindle ウィンドウを自動検出→ screencapture -l で撮り、AX実測のタイトルバー帯だけ
  # 上端クロップする（前面化不要・本文余白を削らない・通常ウィンドウ前提）。
  app_name: ""                    # Kindle アプリ名。空なら "Amazon Kindle"→"Kindle" を自動検出しキャッシュ。特殊名の環境だけ明示指定する
  # 見開き/片ページは Kindle のウィンドウ幅で選ぶ（撮影は常に 1 撮影 = 1 ページ）。
  #   半画面幅 → Kindle が単一ページ表示 → 片ページ（文章系向け）
  #   全画面幅 → Kindle が見開き表示   → 見開き 1 枚をそのまま横長 PDF ページに
  page_turn_key: "right"          # right(key code 124) / left(123)。右綴じ本は要確認
  page_turn_method: "osascript"   # osascript | cliclick
  page_turn_wait: 1.0             # ページ送り後の描画待ち秒
  stable_wait: 0.3                # 安定確認の追加待ち
  stable_required: 2              # 連続安定フレーム数（撮影確定）
  stable_threshold: 2             # 安定確認用のpHash距離（連続フレームの同一判定）
  end_detect_repeats: 3           # 同一ハッシュ連続で終了
  same_threshold: 2               # 前ページとの重複判定用のpHash距離（サムネ除去前提）
  max_pages: 0                    # 0=上限なし（最終ページ自動検出で停止）。正=安全上限
  prevent_sleep: true             # caffeinate 併用

preprocess:
  trim: { top: 0.11, bottom: 0.035, left: 0.015, right: 0.015 }  # 比率トリミング
  min_brightness: 20              # これ未満は黒画面異常として除外

ocr:
  # OCRエンジン: apple(既定・端末内Apple Vision・無料・macOS専用) | google(Google Cloud Vision)
  # google はクラウド送信・従量課金だが手描き/崩し字/極小文字に強い。鍵は環境変数
  # GOOGLE_VISION_API_KEY で渡す（config にはコミットしない）。既定 apple なら従来どおり。
  engine: "apple"
  languages: ["ja-JP", "en-US"]   # apple 専用（google は内部で ja/en 固定）
  recognition_level: "accurate"   # accurate | fast（apple 専用）
  reading_order: "rtl"            # 見開き2カラムの読み順方向: rtl(右→左・漫画/縦書き) | ltr(左→右・横書き)

build:
  image_format: "jpeg"
  jpeg_quality: 88
  target_dpi: 300
  font: "HeiseiMin-W3"            # reportlab内蔵CIDフォント（日本語テキスト層用）
